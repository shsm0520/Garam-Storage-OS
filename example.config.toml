# 💾 가람OS 글로벌 시스템 설정 파일 (config.toml)
hostname = "Garam-Storage-OS-Core"
web_port = 8080
socket_path = "/tmp/garam-daemon.sock"

allowed_uids = [1000]

# config.toml 내부에 심을 도커 안보 스위치 규격
#[docker_policy]
enable_auto_mutation = false  # 🛡️ 기본값 false (옵션화 완공)
default_cpu_limit = 2.0
default_memory_mb = 2048

authz_socket_path = "/tmp/garam-authz.sock"
authz_socket_mode = 0o660
authz_group_name = "garam"

disk_worker_socket_path = "/tmp/garam-disk.sock"
storage_lock_path = "/tmp/garam_storage_execute.lock"
monitor_target_disk = "sda"